name: Deploy (OTA + Web)

# main'e her push'ta (uygulama/paket kodu değiştiyse) HER İKİ app için:
#   1) EAS Update (OTA)  → iOS + Android (production channel, runtime'a göre)
#   2) Web build + deploy → Cloudflare Pages
# Böylece iOS / Android / web tek push'ta birlikte güncellenir.
# Backend-only / migration / docs commit'lerinde tetiklenmez (paths filtresi).
on:
  push:
    branches: [main]
    paths:
      - 'apps/customer/**'
      - 'apps/baker/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {} # Actions sekmesinden elle de tetiklenebilir

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── iOS + Android: EAS Update (OTA) ───────────────────────────────────────
  ota:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [customer, baker]
    env:
      # Commit mesajını güvenli şekilde env üzerinden geçir (injection korumalı).
      UPDATE_MSG: ${{ github.event.head_commit.message || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: EAS Update (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: production
        run: >-
          npx eas-cli@latest update
          --channel production
          --environment production
          --message "$UPDATE_MSG"
          --non-interactive

  # ── Web: Cloudflare Pages deploy ──────────────────────────────────────────
  web:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: customer
            project: pastacim-web
          - app: baker
            project: pastacimpro-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Export web (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}
        env:
          # Web için HTTP-referrer kısıtlı Maps key (native key DEĞİL).
          GOOGLE_MAPS_API_KEY: ${{ secrets.WEB_GOOGLE_MAPS_API_KEY }}
        run: npx expo export -p web --clear
      - name: Deploy to Cloudflare Pages (${{ matrix.project }})
        working-directory: apps/${{ matrix.app }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist --project-name ${{ matrix.project }} --branch main
